{{- $src := .src | default "" -}}
{{- $alt := .alt | default "" -}}
{{- $date := .date | default "" -}}
{{- if $src -}}
<img src="{{ $src }}" alt="{{ $alt }}" data-pagefind-meta="image[src], image_alt[alt]" style="display:none" aria-hidden="true">
{{- else -}}
<meta data-pagefind-meta="image:">
{{- end -}}
{{- if $date -}}
<meta data-pagefind-meta="date[content]" content="{{ $date }}">
{{- end -}}
