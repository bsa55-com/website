{{ define "legacy_main" }}
<div id="content-sidebar-wrap">
  <div id="content" class="hfeed">
    <div class="breadcrumb">You are here: <a href="/" title="View Home">Home</a> / {{ .Title }}</div>
    <div class="post page type-page status-publish hentry">
      <h1 class="entry-title">{{ .Title }}</h1>
      <div class="entry-content">
        {{ .Content }}
        <link rel="stylesheet" href="/pagefind/pagefind-ui.css">
        <style type="text/css">
          .pagefind-shell {
            margin-top: 20px;
          }
          .pagefind-ui {
            --pagefind-ui-scale: 0.92;
            --pagefind-ui-primary: #ac590a;
            --pagefind-ui-text: #333333;
            --pagefind-ui-background: #ffffff;
            --pagefind-ui-border: #cccccc;
            --pagefind-ui-tag: #f7f7f7;
            --pagefind-ui-border-width: 1px;
            --pagefind-ui-border-radius: 0px;
            font-family: Arial, Tahoma, Verdana, sans-serif;
            color: #333333;
          }
          .pagefind-ui * {
            border-radius: 0 !important;
            box-shadow: none !important;
          }
          .pagefind-ui__form {
            margin-bottom: 20px;
          }
          .pagefind-ui__search-input {
            font-family: Arial, Tahoma, Verdana, sans-serif;
            font-size: 12px;
            padding: 6px 0 6px 5px;
            border: 1px solid #7b6e5f;
            background: #ffffff;
          }
          .pagefind-ui__search-clear,
          .pagefind-ui__button {
            font-family: Arial, Tahoma, Verdana, sans-serif;
            font-size: 12px;
          }
          .pagefind-ui__drawer {
            margin-top: 10px;
          }
          .pagefind-ui__message {
            font-family: Arial, Tahoma, Verdana, sans-serif;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0;
            color: #666666;
            margin: 0 0 10px;
          }
          .pagefind-ui__results {
            margin-top: 0;
          }
          .pagefind-ui__result {
            margin: 0 0 30px;
            padding: 0;
            border-top: 0;
            overflow: hidden;
          }
          .pagefind-ui__result-link {
            display: block;
            text-decoration: none;
            overflow: hidden;
            color: inherit;
          }
          h3.pagefind-ui__result-title,
          .pagefind-ui__result-title,
          .pagefind-ui__result-title a,
          .pagefind-ui__result-link .pagefind-ui__result-title {
            font-family: Georgia, "Times New Roman", Trebuchet MS, serif;
            font-size: 22px;
            font-weight: normal;
            line-height: 1.1;
            color: #ac590a !important;
            margin: 0 0 5px;
            text-decoration: none;
          }
          .pagefind-ui__result-link:hover .pagefind-ui__result-title,
          .pagefind-ui__result-title:hover,
          .pagefind-ui__result-title a:hover {
            color: #ac590a;
            text-decoration: underline;
          }
          .pagefind-ui__result-inner {
            padding-top: 5px;
            border-top: 1px dotted #cccccc;
          }
          .pagefind-ui__result-nested {
            display: none;
            font-size: 11px;
            margin: 0 0 10px;
            padding: 5px 0 0;
            text-transform: uppercase;
            color: #333333;
          }
          .pagefind-ui__result-inner {
            overflow: hidden;
          }
          .pagefind-ui__result-thumb {
            float: left;
            width: 150px;
            margin: 0 10px 0 0;
            border: 1px solid #dddddd;
            padding: 4px;
            background: #ffffff;
          }
          .pagefind-ui__result-thumb img {
            display: block;
            width: 100%;
            height: auto;
          }
          .pagefind-ui__result-excerpt {
            font-family: Arial, Tahoma, Verdana, sans-serif;
            font-size: 12px;
            line-height: 20px;
            color: #333333;
            margin: 0;
            overflow: hidden;
          }
          .pagefind-ui__result-excerpt p {
            margin: 0;
            padding: 0;
          }
          .pagefind-ui mark {
            background: #f7ec73;
            color: inherit;
            padding: 0 1px;
          }
          .pagefind-ui__button,
          .pagefind-ui__search-clear {
            border: 1px solid #7b6e5f;
            background: #f7f7f7;
            color: #333333;
          }
          .pagefind-ui__button:hover,
          .pagefind-ui__search-clear:hover {
            background: #efefef;
          }
          @media (max-width: 640px) {
            .pagefind-ui__result-thumb {
              float: none;
              margin: 0 0 10px;
            }
          }
        </style>
        <div class="pagefind-shell">
          <div id="site-search"></div>
        </div>
        <script src="/pagefind/pagefind-ui.js"></script>
        <script>
          window.addEventListener("DOMContentLoaded", function () {
            var params = new URLSearchParams(window.location.search);
            var query = params.get("q") || "";

            new PagefindUI({
              element: "#site-search",
              bundlePath: "/pagefind/",
              showSubResults: true,
              excerptLength: 22,
              resetStyles: false,
              translations: {
                placeholder: "Search this website..."
              }
            });

            if (!query) {
              return;
            }

            window.setTimeout(function () {
              var input = document.querySelector(".pagefind-ui__search-input");
              if (!input) {
                return;
              }
              input.value = query;
              input.dispatchEvent(new Event("input", { bubbles: true }));
            }, 150);
          });
        </script>
        <noscript><p>Search requires JavaScript to load the static search index.</p></noscript>
      </div>
    </div>
  </div>
  {{ partial "legacy/sidebar.html" . }}
</div>
{{ partial "legacy/sidebar_alt.html" . }}
{{ end }}
